<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook</title>

    <link rel="stylesheet" href="/index.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="nav-left">
            <div class="logo">
                <a href=""><i class="fa-brands fa-facebook" style="color: rgb(24, 119, 242);"></i></a>
            </div>

            <div class="search">
                <i class="fa-solid fa-magnifying-glass" style="color: rgb(163, 168, 174);"></i>
                <input type="text" placeholder="Search Facebook">
            </div>
        </div>

        <div class="nav-mid">
            <div class="icon">
                <a href=""><i class="fa-solid fa-house" style="color: rgb(163, 168, 174);"></i></a>
                <a href=""><i class="fa-solid fa-tv" style="color: rgb(163, 168, 174);"></i></a>
                <a href=""><i class="fa-solid fa-shop" style="color: rgb(163, 168, 174);"></i></a>
                <a href=""><i class="fa-solid fa-users" style="color: rgb(163, 168, 174);"></i></a>
                <a href=""><i class="fa-solid fa-bars" style="color: rgb(163, 168, 174);"></i></a>
            </div>
        </div>

        <div class="nav-right">
            <div class="profile">
                <img src="/Assets/profile photo.png" alt="">

                <p>Josephine</p>
            </div>

            <div class="setting">
                <a href=""><i class="fa-solid fa-plus" style="color: rgb(0, 0, 0);"></i></a>
                <a href=""><i class="fa-brands fa-facebook-messenger" style="color: rgb(0, 0, 0);"></i></a>
                <a href=""><i class="fa-solid fa-bell" style="color: rgb(0, 0, 0);"></i></a>
                <a href=""><i class="fa-solid fa-arrow-down" style="color: rgb(0, 0, 0);"></i></a>
            </div>
        </div>
    </nav>

    <div class="sidebar">
        <div class="side-top">
            <div class="prof">
                <img src="/Assets/profile photo.png" alt="">
                <p>Josephine Williams</p>
            </div>

            <div class="side-list">
                <div class="list">
                    <a href=""><i class="fa-solid fa-tv" style="color: rgb(0, 133, 231);"></i> Watch</a>
                    <a href=""><i class="fa-regular fa-calendar" style="color: rgb(31, 31, 35);"></i> Events</a>
                    <a href=""><i class="fa-solid fa-user-group" style="color: rgb(4, 121, 248);"></i> Friends</a>
                    <a href=""></a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
